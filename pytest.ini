[pytest]
# Use FLASK_ENV=development (set in conftest.py) so tests use SQLite
addopts = -v --tb=short --strict-markers
# Require 100% pass rate; coverage reported but not fail (app is large)
# To enforce coverage: add --cov-fail-under=50 (or higher)
testpaths = .
python_files = test_*.py
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.SAWarning
